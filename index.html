<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación Oficial - U.E. Pestalozzi</title>
    <style>
        :root {
            --azul-institucional: #17326a;
            --amarillo-pestalozzi: #fab802;
            --fondo-oscuro: #0f172a;
            --texto-muted: #94a3b8;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--fondo-oscuro);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .card {
            width: 85%;
            max-width: 360px;
            padding: 30px;
            border-radius: 24px;
            border: 3px solid var(--azul-institucional);
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--azul-institucional);
            overflow: hidden;
            background-color: #f8fafc;
            background-image: radial-gradient(circle at 2px 2px, rgba(23, 50, 106, 0.06) 1.5px, transparent 0);
            background-size: 12px 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: flotarEfecto 0.4s ease-out;
        }
        @keyframes flotarEfecto {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .card::before {
            content: "SISTEMA INTEGRADO DE VERIFICACIÓN PESTALOZZI";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 13px;
            width: 200%;
            text-align: center;
            letter-spacing: 2px;
            color: rgba(23, 50, 106, 0.03);
            font-weight: bold;
            z-index: 0;
            pointer-events: none;
            line-height: 2;
        }
        .header {
            text-align: center;
            border-bottom: 2px dashed var(--azul-institucional);
            margin-bottom: 20px;
            padding-bottom: 12px;
        }
        .title {
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 0.5px;
            color: var(--azul-institucional);
        }
        .data-label {
            font-size: 11px;
            color: #556b96;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 14px;
            letter-spacing: 0.5px;
        }
        .data-value {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 4px;
            z-index: 2;
            position: relative;
        }
        .status {
            background: linear-gradient(135deg, #1e7e34 0%, #155d24 100%);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin-top: 25px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(30,126,52,0.3);
        }
    </style>
</head>
<body>

    <div class="modal-overlay">
        <div class="card">
            <div class="header">
                <div class="title">U.E. PESTALOZZI</div>
                <div style="font-size: 11px; color: #556b96; margin-top: 2px; font-weight: 600;">DOCUMENTO DE VALIDACIÓN OFICIAL</div>
            </div>

            <div class="data-label">Estudiante / Beneficiario:</div>
            <div class="data-value" id="nombre-completo">Cargando...</div>

            <div class="data-label">Cédula de Identidad:</div>
            <div class="data-value" id="cedula">0000000000</div>

            <div class="data-label">Periodo Lectivo:</div>
            <div class="data-value" id="periodo">2023-2024</div>

            <div class="status">✓ DOCUMENTO VERIFICADO</div>
        </div>
    </div>

    <script>
        function getParams() {
            const params = new URLSearchParams(window.location.search);
            const nombre = params.get('nombre') || "No encontrado";
            const apellido = params.get('apellido') || "";
            const cedula = params.get('cedula') || "0000000000";
            const periodo = params.get('periodo') || "N/A";

            document.getElementById('nombre-completo').innerText = decodeURIComponent(nombre) + " " + decodeURIComponent(apellido);
            document.getElementById('cedula').innerText = decodeURIComponent(cedula);
            document.getElementById('periodo').innerText = decodeURIComponent(periodo);
        }
        window.onload = getParams;
    </script>
</body>
</html>
