<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PESTALOZZI QR SYSTEM</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --azul-institucional: #17326a;
            --amarillo-pestalozzi: #fab802;
            --fondo-oscuro: #0f172a;
            --texto-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--fondo-oscuro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 30px 24px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--amarillo-pestalozzi) 0%, #d99e00 100%);
            color: var(--azul-institucional);
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(250, 184, 2, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            margin: 8px 0 0 0;
            color: var(--texto-muted);
            font-size: 14px;
            font-weight: 400;
        }

        .scanner-wrapper {
            position: relative;
            margin-top: 25px;
            border-radius: 20px;
            overflow: hidden;
            background: #020617;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        #reader {
            width: 100% !important;
            border: none !important;
        }

        #reader video {
            object-fit: cover !important;
        }

        .laser-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--amarillo-pestalozzi), transparent);
            box-shadow: 0 0 12px var(--amarillo-pestalozzi);
            animation: scanning 2.5s ease-in-out infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes scanning {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .status {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-init { background: #60a5fa; box-shadow: 0 0 8px #60a5fa; }

        .status-scanning {
            background: var(--amarillo-pestalozzi);
            box-shadow: 0 0 8px var(--amarillo-pestalozzi);
            animation: pulse 1.2s infinite alternate;
        }

        .status-success { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .status-error { background: #f87171; box-shadow: 0 0 8px #f87171; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        .txt-token {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--amarillo-pestalozzi);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="badge">Pestalozzi QR System</div>

    <h1>Escáner de Validación</h1>
    <p>Apunta la cámara al código QR institucional</p>

    <div class="scanner-wrapper">
        <div id="laser" class="laser-line"></div>
        <div id="reader"></div>
    </div>

    <div id="status" class="status">
        <span id="dot" class="status-dot status-init"></span>
        <span id="msg">Inicializando cámara trasera...</span>
    </div>

</div>

<script>
const html5QrCode = new Html5Qrcode("reader");
const laser = document.getElementById("laser");
const dot = document.getElementById("dot");
const msg = document.getElementById("msg");

/* 🔊 SONIDO DE DETECCIÓN */
function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "triangle"; // más suave y tecnológico
        oscillator.frequency.setValueAtTime(1200, ctx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.15);

        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.2);
    } catch (e) {}
}

function updateStatus(type, text) {
    dot.className = "status-dot status-" + type;
    msg.innerHTML = text;
}

function start(cameraId) {
    updateStatus("scanning", "Buscando código QR...");
    laser.style.display = "block";

    html5QrCode.start(
        cameraId,
        {
            fps: 15,
            qrbox: { width: 250, height: 250 }
        },
        (decodedText) => {
            playBeep();

            laser.style.display = "none";
            updateStatus("success", "DETECTADO: <span class='txt-token'>" + decodedText + "</span>");

            setTimeout(() => {
                html5QrCode.stop().then(() => {
                    document.getElementById("reader").style.display = "none";

                    if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
                        window.location.href = decodedText;
                    }
                });
            }, 400);
        },
        () => {}
    ).catch(() => fallback());
}

function fallback() {
    laser.style.display = "block";
    updateStatus("scanning", "Buscando código QR...");

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            playBeep();

            laser.style.display = "none";
            updateStatus("success", "DETECTADO: <span class='txt-token'>" + decodedText + "</span>");

            if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
                window.location.href = decodedText;
            }
        }
    ).catch(() => {
        laser.style.display = "none";
        updateStatus("error", "Error crítico: Acceso denegado a la cámara");
    });
}

// Inicialización
Html5Qrcode.getCameras().then(devices => {
    let back = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear") ||
        d.label.toLowerCase().includes("environment") ||
        d.label.toLowerCase().includes("trasera")
    );

    let cameraId = back ? back.id : devices[0].id;
    start(cameraId);
}).catch(() => {
    updateStatus("error", "No se concedieron permisos de hardware");
});
</script>

</body>
</html>
