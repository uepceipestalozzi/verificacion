<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación Oficial Pestalozzi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f6f9; }
        .tarjeta { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; min-width: 320px; margin-top: 50px; border-top: 8px solid #17326a; }
        h2 { color: #17326a; margin-bottom: 5px; }
        .subtitulo { color: #666; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        p { font-size: 18px; color: #444; margin: 12px 0; text-align: left; padding: 0 20px; }
        .resaltado { font-weight: bold; color: #111; float: right; }
        .estado { display: block; margin-top: 25px; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .valido { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .invalido { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .cargando { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h2>UE PCEI PESTALOZZI</h2>
        <p class="subtitulo">Sistema de Validación de Credenciales</p>
        <hr style="border: 0; border-top: 1px solid #eee;">
        
        <p>Cédula: <span id="lblCedula" class="resaltado">Buscando...</span></p>
        <p>Estudiante: <span id="lblNombre" class="resaltado">Buscando...</span></p>
        <p>Periodo: <span id="lblPeriodo" class="resaltado">Buscando...</span></p>
        
        <div id="boxEstado" class="estado cargando">🔄 Consultando Base de Datos Cloud...</div>
    </div>

    <script>
        const PROJECT_ID = "estudiantes-95022";

        // 1. Extraemos la cédula de la URL del QR
        const urlParams = new URLSearchParams(window.location.search);
        const cedulaQR = urlParams.get('cedula');

        const lblCedula = document.getElementById("lblCedula");
        const lblNombre = document.getElementById("lblNombre");
        const lblPeriodo = document.getElementById("lblPeriodo");
        const boxEstado = document.getElementById("boxEstado");

        if (!cedulaQR) {
            lblCedula.textContent = "Error";
            lblNombre.textContent = "No detectado";
            lblPeriodo.textContent = "N/A";
            boxEstado.className = "estado invalido";
            boxEstado.textContent = "❌ URL INVÁLIDA: Falta parámetro de consulta.";
        } else {
            // 2. Hacemos la consulta en tiempo real directo a Firebase Firestore mediante API REST
            const urlFirestore = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/estudiantes/${cedulaQR.trim()}`;

            fetch(urlFirestore)
                .then(response => {
                    if (response.status === 200) {
                        return response.json();
                    } else {
                        throw new Error("Estudiante no encontrado");
                    }
                })
                .then(data => {
                    // 3. Si el documento existe, extraemos los campos reales de la nube
                    const campos = data.fields;
                    const cedulaCloud = campos.cedula.stringValue;
                    const nombreCloud = campos.nombre.stringValue;
                    const apellidoCloud = campos.apellido.stringValue;
                    const periodoCloud = campos.periodo.stringValue;

                    // Pintamos los datos validados en pantalla
                    lblCedula.textContent = cedulaCloud;
                    lblNombre.textContent = `${apellidoCloud} ${nombreCloud}`;
                    lblPeriodo.textContent = periodoCloud;

                    // Activamos el sello verde de validación exitosa
                    boxEstado.className = "estado valido";
                    boxEstado.textContent = "✓ CREDENCIAL OFICIAL VERIFICADA";
                })
                .catch(error => {
                    // 4. Si el alumno no existe o fue borrado del Sheets, salta el bloqueo
                    lblCedula.textContent = cedulaQR;
                    lblNombre.textContent = "NO REGISTRADO";
                    lblPeriodo.textContent = "FALLIDO";
                    
                    boxEstado.className = "estado invalido";
                    boxEstado.textContent = "❌ ALERTA: Credencial No Válida o Falsificada";
                });
        }
    </script>

</body>
</html>
